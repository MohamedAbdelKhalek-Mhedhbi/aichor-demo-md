kind: AIchorManifest  
apiVersion: 0.2.2   
 
builder:   
  image: pytorch-demo   
  context: pytorch-demo # folder
  dockerfile: ./Dockerfile

spec:
  operator: pytorch 
  image: image
  command: "env && sleep 3600"
  engineName: deleteme-2429
  tensorboard:
    enabled: true
  types:
    worker:
      count: 1
      resources:
        cpus: 1
        ramRatio: 1
        shmSizeGB: 0
